<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Parking Lot Escape</title>
<style>
  :root {
    --bg-1: #0f172a;
    --bg-2: #1e293b;
    --panel: #111827;
    --ink: #e5e7eb;
    --muted: #94a3b8;
    --accent: #f97316;
    --accent-2: #fbbf24;
    --good: #22c55e;
    --cell: #1e293b;
    --cell-line: #334155;
    --board: #0b1220;
    --target: #ef4444;
    --target-2: #f87171;
    --wall: #475569;
    --tile-glow: rgba(251, 146, 60, 0.55);
    --shadow: 0 6px 14px rgba(0,0,0,.35);
  }
  /* Theme: garage (default), city, industrial, neon, midnight */
  body[data-theme="city"] {
    --board: #0a1929; --bg-1: #0f1d2e; --accent: #38bdf8; --accent-2: #67e8f9;
  }
  body[data-theme="industrial"] {
    --board: #1a1410; --bg-1: #1f1a14; --accent: #f59e0b; --accent-2: #fde68a;
  }
  body[data-theme="neon"] {
    --board: #14081f; --bg-1: #1a0a2e; --accent: #d946ef; --accent-2: #f0abfc;
  }
  body[data-theme="midnight"] {
    --board: #050816; --bg-1: #0a0f23; --accent: #818cf8; --accent-2: #a5b4fc;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(circle at 30% 0%, var(--bg-1) 0%, #0b1220 60%, #060912 100%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh; overflow-x: hidden;
    transition: background 0.6s ease;
  }
  #app { max-width: 720px; margin: 0 auto; padding: 20px 16px 40px; }
  header { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
  header h1 {
    margin: 0; font-size: 28px; letter-spacing: 0.5px;
    background: linear-gradient(90deg, var(--accent-2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; }
  .controls button, .modal button {
    background: var(--panel); color: var(--ink); border: 1px solid #334155;
    border-radius: 8px; padding: 8px 14px; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s, transform .1s, border-color .15s;
  }
  .controls button:hover:not(:disabled), .modal button:hover:not(:disabled) {
    background: #1f2937; border-color: var(--accent);
  }
  .controls button:active:not(:disabled) { transform: scale(0.97); }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls button.primary {
    background: linear-gradient(180deg, var(--accent), #d35400);
    border-color: transparent; color: #1a0a02;
  }
  .stats {
    display: flex; flex-wrap: wrap; gap: 18px;
    font-size: 14px; color: var(--muted);
  }
  .stats b { color: var(--ink); font-weight: 600; }
  .stats .star-row { display: inline-flex; gap: 2px; }

  main { display: flex; justify-content: center; }
  #board-wrap {
    position: relative; width: 100%; max-width: 600px; aspect-ratio: 1 / 1;
  }
  #board {
    position: relative; width: 100%; height: 100%;
    background: var(--board); border: 3px solid #334155; border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,.5), inset 0 0 30px rgba(0,0,0,.6);
    overflow: visible; user-select: none; -webkit-user-select: none; touch-action: none;
  }
  .grid-bg {
    position: absolute; inset: 6px;
    background-image:
      linear-gradient(to right, #243046 1px, transparent 1px),
      linear-gradient(to bottom, #243046 1px, transparent 1px);
    background-size: calc(100% / var(--cols)) calc(100% / var(--rows));
    border-radius: 8px; pointer-events: none;
  }
  .exit {
    position: absolute; right: -3px; width: 14px;
    background: linear-gradient(180deg, var(--accent-2), var(--accent));
    border-radius: 0 6px 6px 0;
    box-shadow: 0 0 16px rgba(251, 146, 60, 0.7);
    pointer-events: none;
  }
  .exit::before {
    content: 'EXIT'; position: absolute; top: 50%; left: 22px;
    transform: translateY(-50%); color: var(--accent-2);
    font-weight: 700; font-size: 12px; letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(251, 146, 60, 0.6);
  }

  /* ============ Tiles (board features) ============ */
  .tile {
    position: absolute; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 24px;
    text-shadow: 0 0 8px var(--tile-glow);
  }
  .tile.oneway {
    color: var(--accent-2);
    background: radial-gradient(circle, rgba(251,146,60,0.18) 0%, transparent 70%);
  }
  .tile.teleport {
    color: var(--accent);
    background: radial-gradient(circle, rgba(168,85,247,0.25) 0%, transparent 70%);
    border: 1px dashed rgba(168, 85, 247, 0.5);
    border-radius: 50%;
  }
  .tile.teleport::before {
    content: attr(data-pair); position: absolute;
    font-size: 11px; color: var(--accent-2); font-weight: 700;
    bottom: 2px; right: 4px; opacity: 0.8;
  }
  .tile.wall {
    background: repeating-linear-gradient(45deg, #334155, #334155 4px, #1e293b 4px, #1e293b 8px);
    border: 1px solid #475569; border-radius: 4px;
  }

  /* ============ Blocks (vehicles) ============ */
  .car {
    position: absolute; border-radius: 10px; cursor: grab;
    box-shadow: var(--shadow), inset 0 -6px 0 rgba(0,0,0,.18), inset 0 2px 0 rgba(255,255,255,.18);
    transition: transform 0.18s cubic-bezier(.2,.9,.3,1.2), box-shadow 0.15s, left 0.18s, top 0.18s, width 0.18s, height 0.18s;
    will-change: transform; display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: rgba(255,255,255,.85); font-size: 14px; letter-spacing: 1px;
  }
  .car.dragging {
    transition: none; cursor: grabbing;
    box-shadow: 0 12px 24px rgba(0,0,0,.55), inset 0 -6px 0 rgba(0,0,0,.18), inset 0 2px 0 rgba(255,255,255,.22);
    z-index: 5;
  }
  .car.target {
    background: linear-gradient(180deg, var(--target-2), var(--target));
    color: #2a0606;
  }
  .car.target::after {
    content: '★'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: rgba(0,0,0,.45); pointer-events: none;
  }
  .car.c1 { background: linear-gradient(180deg, #7dd3fc, #38bdf8); }
  .car.c2 { background: linear-gradient(180deg, #a5b4fc, #6366f1); }
  .car.c3 { background: linear-gradient(180deg, #c4b5fd, #8b5cf6); }
  .car.c4 { background: linear-gradient(180deg, #5eead4, #14b8a6); }
  .car.c5 { background: linear-gradient(180deg, #fde68a, #f59e0b); }
  .car.c6 { background: linear-gradient(180deg, #fdba74, #ea580c); }
  .car.c7 { background: linear-gradient(180deg, #bef264, #65a30d); }
  .car.c8 { background: linear-gradient(180deg, #f9a8d4, #db2777); }

  /* Direction-locked: subtle axis indicator on the car */
  .car .lock-arrow {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: rgba(255,255,255,0.45); pointer-events: none;
  }

  /* Swivel block: pivot dot at the anchor end */
  .car.swivel { cursor: grab; }
  .car.swivel .pivot {
    position: absolute; width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 30%, var(--accent) 70%);
    box-shadow: 0 0 8px var(--accent), inset 0 0 4px rgba(0,0,0,0.5);
    pointer-events: none; z-index: 2;
  }
  .car.swivel .arc-hint {
    position: absolute; inset: -6px;
    border: 2px dashed rgba(251, 146, 60, 0.0);
    border-radius: 12px; pointer-events: none;
    transition: border-color 0.3s;
  }
  .car.swivel.first-time .arc-hint { border-color: rgba(251, 146, 60, 0.65); animation: spin 3s linear infinite; }

  /* Heavy block: chunky border, weight icon */
  .car.heavy {
    border: 3px solid rgba(0,0,0,0.4);
    box-shadow: var(--shadow), inset 0 -8px 0 rgba(0,0,0,.3), inset 0 2px 0 rgba(255,255,255,.1);
  }
  .car.heavy::before {
    content: '⬛'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: rgba(0,0,0,0.5); pointer-events: none;
  }

  /* Breakable block: cracked texture */
  .car.breakable {
    background-image:
      linear-gradient(135deg, rgba(255,255,255,0.0) 30%, rgba(0,0,0,0.2) 50%, rgba(255,255,255,0.0) 70%),
      var(--bg-img, linear-gradient(180deg, #94a3b8, #64748b));
    border: 1px dashed rgba(0,0,0,0.4);
    background-blend-mode: overlay;
  }
  .car.breakable.shatter {
    animation: shatter 0.4s ease-out forwards;
    pointer-events: none;
  }
  @keyframes shatter {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15) rotate(4deg); opacity: 0.8; filter: brightness(1.5); }
    100% { transform: scale(0.4) rotate(-12deg); opacity: 0; }
  }

  /* Key block + Lock block */
  .car.key {
    box-shadow: var(--shadow), inset 0 -6px 0 rgba(0,0,0,.18), inset 0 2px 0 rgba(255,255,255,.22),
                0 0 14px var(--key-color, #fbbf24);
  }
  .car.key::after {
    content: '🔑'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: rgba(0,0,0,.5); pointer-events: none;
  }
  .car.lock {
    background: linear-gradient(180deg, #4b5563, #1f2937) !important;
    border: 2px solid var(--key-color, #fbbf24);
    cursor: not-allowed;
  }
  .car.lock::after {
    content: '🔒'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--key-color, #fbbf24); pointer-events: none;
  }
  .car.lock.unlocked {
    border-color: var(--good); cursor: grab;
    background: linear-gradient(180deg, #6b7280, #374151) !important;
  }
  .car.lock.unlocked::after { content: '🔓'; color: var(--good); }

  /* First-encounter pulse: applied once per session per mechanic */
  .car.first-time {
    animation: firstpulse 2s ease-in-out 2;
  }
  @keyframes firstpulse {
    0%, 100% { box-shadow: var(--shadow); }
    50% { box-shadow: 0 0 24px var(--accent), 0 0 36px var(--accent-2); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Hint banner: subtle one-time hint at top of board */
  #hint-banner {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    background: rgba(15, 23, 42, 0.88);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--accent-2);
    backdrop-filter: blur(6px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 8;
    white-space: nowrap;
  }
  #hint-banner.show { opacity: 1; }

  /* Win overlay */
  #win-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(11, 18, 32, .82);
    border-radius: 14px; z-index: 10;
    backdrop-filter: blur(4px); animation: fadein .25s ease;
  }
  #win-overlay.hidden { display: none; }
  .win-card {
    background: linear-gradient(180deg, #1e293b, #0f172a);
    border: 1px solid var(--accent);
    border-radius: 14px; padding: 28px 32px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.55); max-width: 320px;
  }
  .win-card h2 {
    margin: 0 0 8px;
    background: linear-gradient(90deg, var(--good), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-size: 32px;
  }
  .win-card p { margin: 0 0 18px; color: var(--muted); }
  .win-card .stars { font-size: 28px; margin: 8px 0 14px; letter-spacing: 6px; }
  .win-card .stars span { color: #475569; transition: color 0.3s; }
  .win-card .stars span.lit { color: var(--accent-2); text-shadow: 0 0 12px var(--accent); }
  .win-card .row { display: flex; gap: 8px; justify-content: center; }
  .win-card button {
    background: linear-gradient(180deg, var(--accent-2), var(--accent));
    border: none; color: #1a0a02;
    padding: 10px 18px; border-radius: 8px;
    font-weight: 700; cursor: pointer; font-size: 14px;
  }
  .win-card button.secondary {
    background: var(--panel); color: var(--ink); border: 1px solid #334155;
  }

  /* Level modal */
  #level-modal, #replay-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  #level-modal.hidden, #replay-modal.hidden { display: none; }
  .modal {
    background: linear-gradient(180deg, #1e293b, #0f172a);
    padding: 24px; border-radius: 14px;
    border: 1px solid #334155;
    width: min(92vw, 560px); max-height: 80vh; overflow-y: auto;
  }
  .modal h2 { margin-top: 0; }
  .pack-section { margin-bottom: 16px; }
  .pack-section h3 {
    font-size: 14px; color: var(--accent-2); margin: 12px 0 6px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  #level-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  }
  .level-btn {
    aspect-ratio: 1 / 1; background: var(--panel);
    border: 1px solid #334155; border-radius: 8px;
    color: var(--ink); font-weight: 600; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1px; font-size: 14px; padding: 2px;
    transition: background .15s, transform .1s;
  }
  .level-btn:hover:not(:disabled) { background: #1f2937; transform: scale(1.04); }
  .level-btn:disabled { opacity: 0.32; cursor: not-allowed; }
  .level-btn.solved { border-color: var(--good); }
  .level-btn.perfect { border-color: var(--accent-2); box-shadow: 0 0 0 1px var(--accent-2); }
  .level-btn.current { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
  .level-btn .best { font-size: 10px; font-weight: 400; color: var(--muted); }
  .level-btn .stars-mini { font-size: 9px; letter-spacing: 1px; color: var(--accent-2); height: 10px; }

  .difficulty-tag { font-size: 12px; font-weight: 500; color: var(--muted); margin: 4px 0 8px; }
  .difficulty-tag.easy { color: #4ade80; }
  .difficulty-tag.medium { color: #facc15; }
  .difficulty-tag.hard { color: #fb923c; }
  .difficulty-tag.expert { color: #ef4444; }
  .difficulty-tag.master { color: #d946ef; }

  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0.6); }
    70% { box-shadow: 0 0 0 12px rgba(251, 146, 60, 0); }
    100% { box-shadow: 0 0 0 0 rgba(251, 146, 60, 0); }
  }
  .car.target.hint { animation: pulse 1.5s infinite; }

  @media (max-width: 480px) {
    header h1 { font-size: 22px; }
    .stats { font-size: 13px; gap: 12px; }
    .controls button { padding: 7px 10px; font-size: 13px; }
    #level-grid { grid-template-columns: repeat(4, 1fr); }
  }
</style>
</head>
<body data-theme="garage">
<div id="app">
  <header>
    <h1>Parking Lot Escape</h1>
    <div class="controls">
      <button id="btn-reset">Reset</button>
      <button id="btn-undo">Undo</button>
      <button id="btn-prev">◀ Prev</button>
      <button id="btn-next" disabled>Next ▶</button>
      <button id="btn-levels">Levels</button>
      <button id="btn-replay" title="Watch optimal solution">Watch</button>
      <button id="btn-daily" title="Daily challenge">Daily</button>
    </div>
    <div class="stats">
      <span>Level <b id="level-num">1</b></span>
      <span id="diff-badge"></span>
      <span>Moves: <b id="moves">0</b></span>
      <span>Best: <b id="best">—</b></span>
      <span>Optimal: <b id="optimal">—</b></span>
      <span>Time: <b id="time">0:00</b></span>
    </div>
  </header>
  <main>
    <div id="board-wrap">
      <div id="board"></div>
      <div id="hint-banner"></div>
      <div id="win-overlay" class="hidden">
        <div class="win-card">
          <h2>Solved!</h2>
          <div class="stars"><span id="s1">★</span><span id="s2">★</span><span id="s3">★</span></div>
          <p id="win-stats"></p>
          <div class="row">
            <button id="btn-watch-from-win" class="secondary">Watch optimal</button>
            <button id="btn-next-from-win">Next ▶</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="level-modal" class="hidden">
  <div class="modal">
    <h2>Select Level</h2>
    <div id="level-packs"></div>
    <button id="btn-close-levels">Close</button>
  </div>
</div>

<div id="replay-modal" class="hidden">
  <div class="modal" style="max-width: 360px; text-align: center;">
    <h2>Watching optimal solution</h2>
    <p style="color: var(--muted)">Move <b id="replay-step">0</b> / <b id="replay-total">0</b></p>
    <div class="row" style="display:flex; gap:8px; justify-content:center;">
      <button id="btn-replay-stop">Stop</button>
    </div>
  </div>
</div>

<script>
/* =========================================================================
   PARKING LOT ESCAPE — v2
   - 6x6 grid, generalized block model (sliders + swivels)
   - Mechanics: direction-lock, swivel, heavy, breakable, key/lock,
     one-way tiles, gravity, teleport
   - 100 hand-crafted levels across 5 themed packs
   - Bonuses: perfect-move ★, watch-solution replay, daily challenge
   ========================================================================= */
(() => {
  'use strict';

  // ============ Constants ============
  const GRID_ROWS = 6;
  const GRID_COLS = 6;
  const EXIT_ROW = 2;
  const STORAGE_KEY = 'parking_lot_escape_v2';
  const MAX_BFS_STATES = 400000;

  // Theme packs (group level ranges to a CSS theme)
  const PACKS = [
    { id: 'garage',     name: 'Downtown Garage', range: [1, 20] },
    { id: 'city',       name: 'City Streets',    range: [21, 40] },
    { id: 'industrial', name: 'Industrial Yard', range: [41, 60] },
    { id: 'neon',       name: 'Neon District',   range: [61, 80] },
    { id: 'midnight',   name: 'Midnight Lot',    range: [81, 100] },
  ];
  function packForLevel(num) {
    return PACKS.find(p => num >= p.range[0] && num <= p.range[1]) || PACKS[0];
  }

  // ============ Storage ============
  function loadProgress() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : { best: {}, solved: {}, perfect: {}, hintShown: {}, dailyDone: {} };
    } catch (e) {
      return { best: {}, solved: {}, perfect: {}, hintShown: {}, dailyDone: {} };
    }
  }
  function saveProgress() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch(e) {}
  }
  const progress = loadProgress();

  // ============ Levels ============
  // Block formats supported:
  //  Slider:     { dir, len, row, col, target?, heavy?, breakable?, keyId?, lockId? }
  //  Swivel:     { kind:'swivel', dir, len, row, col, extent? }
  //
  // Tiles (level.tiles):
  //  { row, col, type:'oneway', arrowDir:'left'|'right'|'up'|'down' }
  //  { row, col, type:'teleport', pairId:'A' }   // exactly two tiles share a pairId
  //  { row, col, type:'wall' }
  //
  // Level fields:
  //  { name, diff, blocks, tiles?, gravity? ('down'|null), hint }
  //   - 'cars' is accepted as an alias for 'blocks' (legacy)
  //   - 'hint' is a designer note; it is NOT shown to the player
  const LEVELS = [];  // populated below

  // ============ Block model ============
  function normalizeBlock(b, idx) {
    return {
      id: b.id ?? `b${idx}`,
      kind: b.kind ?? 'slider',
      dir: b.dir,
      len: b.len,
      row: b.row,
      col: b.col,
      extent: b.extent ?? 1,
      target: !!b.target,
      heavy: b.heavy ?? 0,
      breakable: !!b.breakable,
      keyId: b.keyId ?? null,
      lockId: b.lockId ?? null,
      destroyed: false,
      unlocked: false,
    };
  }
  function normalizeTile(t) {
    return { row: t.row, col: t.col, type: t.type, arrowDir: t.arrowDir, pairId: t.pairId };
  }
  // Cells occupied by a block (in board coords).
  function cellsOf(b) {
    if (b.destroyed) return [];
    const ext = b.extent || 1;
    const dr = b.dir === 'v' ? ext : 0;
    const dc = b.dir === 'h' ? ext : 0;
    const cells = [];
    for (let i = 0; i < b.len; i++) cells.push({ r: b.row + i * dr, c: b.col + i * dc });
    return cells;
  }
  // Pivot cell of a swivel (the anchor end — first cell in the cells array).
  function pivotOf(b) { return { r: b.row, c: b.col }; }
  // Build occupancy: 2D grid of block index per cell, -1 if empty.
  function buildOccupancy(blockList, walls) {
    const g = Array.from({ length: GRID_ROWS }, () => Array(GRID_COLS).fill(-1));
    if (walls) walls.forEach(w => { if (in_bounds(w.r, w.c)) g[w.r][w.c] = -2; });
    blockList.forEach((b, idx) => {
      cellsOf(b).forEach(({ r, c }) => {
        if (in_bounds(r, c)) g[r][c] = idx;
      });
    });
    return g;
  }
  function in_bounds(r, c) { return r >= 0 && r < GRID_ROWS && c >= 0 && c < GRID_COLS; }

  // ============ Game state ============
  let levelIdx = 0;
  let blocks = [];
  let tiles = [];
  let walls = [];           // filtered list of wall tiles for occupancy
  let onewayMap = {};       // "r,c" -> arrowDir
  let teleportMap = {};     // "r,c" -> partner {r,c}
  let gravity = null;       // 'down' | null
  let history = [];
  let moves = 0;
  let won = false;
  let timerStart = 0;
  let timerInterval = null;
  let solveData = null;     // { minMoves, path }
  let dragState = null;
  let selectedBlockIdx = null;
  let replayActive = false;
  let dailyMode = false;

  // ============ DOM refs ============
  const boardEl = document.getElementById('board');
  const hintBanner = document.getElementById('hint-banner');
  const winOverlay = document.getElementById('win-overlay');
  const winStats = document.getElementById('win-stats');
  const star1 = document.getElementById('s1'), star2 = document.getElementById('s2'), star3 = document.getElementById('s3');
  const movesEl = document.getElementById('moves');
  const bestEl = document.getElementById('best');
  const optimalEl = document.getElementById('optimal');
  const timeEl = document.getElementById('time');
  const levelNumEl = document.getElementById('level-num');
  const diffBadge = document.getElementById('diff-badge');
  const btnNext = document.getElementById('btn-next');
  const btnPrev = document.getElementById('btn-prev');
  const btnReset = document.getElementById('btn-reset');
  const btnUndo = document.getElementById('btn-undo');
  const btnLevels = document.getElementById('btn-levels');
  const btnReplay = document.getElementById('btn-replay');
  const btnDaily = document.getElementById('btn-daily');
  const btnNextFromWin = document.getElementById('btn-next-from-win');
  const btnWatchFromWin = document.getElementById('btn-watch-from-win');
  const btnCloseLevels = document.getElementById('btn-close-levels');
  const levelModal = document.getElementById('level-modal');
  const levelPacks = document.getElementById('level-packs');
  const replayModal = document.getElementById('replay-modal');
  const replayStepEl = document.getElementById('replay-step');
  const replayTotalEl = document.getElementById('replay-total');
  const btnReplayStop = document.getElementById('btn-replay-stop');

  // ============ Geometry helpers ============
  function cellSize() {
    const rect = boardEl.getBoundingClientRect();
    return (rect.width - 12) / GRID_COLS;
  }
  function cellInset() { return 6; }

  // ============ Move generation: SLIDE ============
  // Returns max steps a slider/swivel-as-slider can move along its axis in `delta` direction.
  // Considers: walls, other blocks, lock state, one-way tiles, off-grid (target exit).
  // Note: swivels do NOT slide — they only rotate. This always returns 0 for swivels.
  function maxSlide(blockList, idx, delta) {
    const b = blockList[idx];
    if (!b || b.destroyed) return 0;
    if (b.kind === 'swivel') return 0;
    if (b.lockId && !b.unlocked) return 0;
    const occ = buildOccupancy(blockList, walls);
    cellsOf(b).forEach(({ r, c }) => occ[r][c] = -1);

    let steps = 0;
    while (true) {
      const next = steps + 1;
      // The newly-entered (leading) cell when advancing one more step:
      let cr, cc;
      if (delta > 0) {
        cr = b.row + (b.dir === 'v' ? b.len - 1 + next : 0);
        cc = b.col + (b.dir === 'h' ? b.len - 1 + next : 0);
      } else {
        cr = b.row + (b.dir === 'v' ? -next : 0);
        cc = b.col + (b.dir === 'h' ? -next : 0);
      }
      // Off-grid? only the target's right exit is allowed.
      if (!in_bounds(cr, cc)) {
        if (b.target && b.dir === 'h' && delta > 0 && cr === EXIT_ROW) {
          return steps + GRID_COLS;
        }
        break;
      }
      // Blocked by wall or another block?
      if (occ[cr][cc] !== -1) break;
      // One-way tile constraint: incoming move direction must match arrow.
      const key = `${cr},${cc}`;
      if (onewayMap[key]) {
        const moveDir = (b.dir === 'h' ? (delta > 0 ? 'right' : 'left') : (delta > 0 ? 'down' : 'up'));
        if (onewayMap[key] !== moveDir) break;
      }
      steps = next;
    }
    return steps;
  }

  // Compute the cells swept by a swivel rotation from (dir, extent) to (newDir, newExtent),
  // assuming a 90° turn around pivot. Returns array of {r,c} cells (excluding pivot).
  function sweptCells(b, newDir, newExtent) {
    const { r: pr, c: pc } = pivotOf(b);
    // Body cells in start orientation (excluding pivot)
    const startBody = [];
    {
      const ext = b.extent || 1;
      const dr = b.dir === 'v' ? ext : 0;
      const dc = b.dir === 'h' ? ext : 0;
      for (let i = 1; i < b.len; i++) startBody.push({ r: pr + i * dr, c: pc + i * dc });
    }
    // Body cells in end orientation (excluding pivot)
    const endBody = [];
    {
      const dr = newDir === 'v' ? newExtent : 0;
      const dc = newDir === 'h' ? newExtent : 0;
      for (let i = 1; i < b.len; i++) endBody.push({ r: pr + i * dr, c: pc + i * dc });
    }
    // Bounding box of all cells (start + end + pivot)
    const all = [{r: pr, c: pc}, ...startBody, ...endBody];
    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
    all.forEach(({r,c}) => {
      if (r < minR) minR = r; if (r > maxR) maxR = r;
      if (c < minC) minC = c; if (c > maxC) maxC = c;
    });
    const startSet = new Set(startBody.map(p => `${p.r},${p.c}`));
    const endSet = new Set(endBody.map(p => `${p.r},${p.c}`));
    const swept = [];
    for (let r = minR; r <= maxR; r++) {
      for (let c = minC; c <= maxC; c++) {
        if (r === pr && c === pc) continue;
        if (startSet.has(`${r},${c}`) || endSet.has(`${r},${c}`)) continue;
        swept.push({ r, c });
      }
    }
    return { swept, endBody };
  }

  // 4 possible orientations for a swivel
  const SWIVEL_ORIENTATIONS = [
    { dir: 'h', extent: +1 },
    { dir: 'h', extent: -1 },
    { dir: 'v', extent: +1 },
    { dir: 'v', extent: -1 },
  ];
  function adjacentRotations(b) {
    // From any orientation, the two perpendicular orientations are 90°-adjacent.
    const out = [];
    SWIVEL_ORIENTATIONS.forEach(o => {
      if (o.dir !== b.dir) out.push(o);
    });
    return out;
  }
  // Validate a swivel rotation against current occupancy.
  function canRotate(blockList, idx, newDir, newExtent) {
    const b = blockList[idx];
    if (b.kind !== 'swivel') return false;
    if (b.dir === newDir) return false; // not a 90° rotation
    const occ = buildOccupancy(blockList, walls);
    // Clear self
    cellsOf(b).forEach(({ r, c }) => occ[r][c] = -1);
    const { swept, endBody } = sweptCells(b, newDir, newExtent);
    // All end cells in-bounds and free
    for (const { r, c } of endBody) {
      if (!in_bounds(r, c)) return false;
      if (occ[r][c] !== -1) return false;
      // Don't allow rotating into walls (already covered by occ === -2).
    }
    // All swept cells in-bounds and free (otherwise the arm passes through something).
    for (const { r, c } of swept) {
      if (!in_bounds(r, c)) return false;
      if (occ[r][c] !== -1) return false;
    }
    return true;
  }

  // ============ Apply moves ============
  // Snapshot-based undo: each user-initiated move stores the full pre-move state.
  // This makes side effects (gravity / teleport / lock unlock) trivially reversible.
  function snapshot() {
    return { blocks: blocks.map(b => ({ ...b })), moves };
  }
  function applySlide(idx, delta, steps, opts = {}) {
    const b = blocks[idx];
    // Heavy blocks can only advance 1 cell per drag.
    if (b.heavy && b.heavy > 1) steps = Math.min(steps, 1);
    if (steps <= 0 && !opts.shatter) return false;
    const snap = snapshot();
    const cost = (b.heavy && b.heavy > 1) ? b.heavy : 1;
    if (b.dir === 'h') b.col += delta * steps;
    else b.row += delta * steps;
    if (opts.shatter && b.breakable) b.destroyed = true;
    moves += cost;
    handleTeleport(idx);
    applyGravity();
    updateLocks();
    history.push(snap);
    return true;
  }
  function applyRotate(idx, newDir, newExtent) {
    const b = blocks[idx];
    const snap = snapshot();
    b.dir = newDir;
    b.extent = newExtent;
    moves += 1;
    handleTeleport(idx);
    applyGravity();
    updateLocks();
    history.push(snap);
    return true;
  }
  function undoMove() {
    if (history.length === 0) return;
    const snap = history.pop();
    blocks = snap.blocks;
    moves = snap.moves;
    won = false;
    winOverlay.classList.add('hidden');
    btnNext.disabled = !progress.solved[levelKey()];
    renderBlocks();
    updateHud();
  }

  // ============ Mechanics: locks, gravity, teleport ============
  function updateLocks() {
    // A lock unlocks when its matching key (any cell) is adjacent to any cell of the lock.
    const keysByID = {};
    blocks.forEach((b, i) => {
      if (b.keyId && !b.destroyed) (keysByID[b.keyId] ||= []).push(i);
    });
    blocks.forEach(b => {
      if (b.lockId && !b.unlocked) {
        const keys = keysByID[b.lockId] || [];
        const lockCells = cellsOf(b);
        let touch = false;
        for (const ki of keys) {
          const kc = cellsOf(blocks[ki]);
          for (const a of lockCells) for (const c of kc) {
            if (Math.abs(a.r - c.r) + Math.abs(a.c - c.c) === 1) { touch = true; break; }
            if (touch) break;
          }
          if (touch) break;
        }
        if (touch) b.unlocked = true;
      }
    });
  }

  function applyGravity() {
    if (!gravity) return;
    let changed = true;
    while (changed) {
      changed = false;
      const order = [...blocks.keys()].sort((a, b) => {
        const ra = Math.max(...cellsOf(blocks[a]).map(p => p.r), -Infinity);
        const rb = Math.max(...cellsOf(blocks[b]).map(p => p.r), -Infinity);
        return gravity === 'down' ? rb - ra : ra - rb;
      });
      for (const i of order) {
        const b = blocks[i];
        if (b.destroyed) continue;
        if (b.kind === 'swivel') continue;
        if (b.lockId && !b.unlocked) continue;
        if (b.keyId) continue;
        const dr = gravity === 'down' ? +1 : -1;
        const cells = cellsOf(b);
        const occ = buildOccupancy(blocks, walls);
        cells.forEach(({ r, c }) => occ[r][c] = -1);
        let canFall = true;
        for (const { r, c } of cells) {
          const nr = r + dr;
          if (!in_bounds(nr, c)) { canFall = false; break; }
          if (occ[nr][c] !== -1) { canFall = false; break; }
          const okey = `${nr},${c}`;
          if (onewayMap[okey]) {
            const need = dr > 0 ? 'down' : 'up';
            if (onewayMap[okey] !== need) { canFall = false; break; }
          }
        }
        if (canFall) { b.row += dr; changed = true; }
      }
    }
  }

  function handleTeleport(idx) {
    const b = blocks[idx];
    if (b.destroyed || b.kind === 'swivel') return;
    const cells = cellsOf(b);
    for (let i = 0; i < cells.length; i++) {
      const { r, c } = cells[i];
      const partner = teleportMap[`${r},${c}`];
      if (!partner) continue;
      const ext = b.extent || 1;
      const dr = b.dir === 'v' ? ext : 0;
      const dc = b.dir === 'h' ? ext : 0;
      const newRow = partner.r - i * dr;
      const newCol = partner.c - i * dc;
      const occ = buildOccupancy(blocks, walls);
      cellsOf(b).forEach(p => occ[p.r][p.c] = -1);
      let ok = true;
      for (let j = 0; j < b.len; j++) {
        const nr = newRow + j * dr;
        const nc = newCol + j * dc;
        if (!in_bounds(nr, nc)) { ok = false; break; }
        if (occ[nr][nc] !== -1) { ok = false; break; }
      }
      if (ok) { b.row = newRow; b.col = newCol; }
      return;
    }
  }

  // ============ Win check ============
  function isSolved(blockList) {
    const t = blockList.find(b => b.target && !b.destroyed);
    if (!t) return false;
    const occ = buildOccupancy(blockList, walls);
    cellsOf(t).forEach(({ r, c }) => occ[r][c] = -1);
    for (let c = t.col + t.len; c < GRID_COLS; c++) {
      if (occ[t.row][c] !== -1) return false;
    }
    return true;
  }

  // ============ Rendering ============
  function buildBoard() {
    boardEl.style.setProperty('--cols', GRID_COLS);
    boardEl.style.setProperty('--rows', GRID_ROWS);
    boardEl.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'grid-bg';
    boardEl.appendChild(grid);

    // Tiles (under blocks)
    const cs = cellSize(); const inset = cellInset();
    tiles.forEach(t => {
      const el = document.createElement('div');
      el.className = `tile ${t.type}`;
      if (t.type === 'oneway') el.textContent = ({left:'◀', right:'▶', up:'▲', down:'▼'})[t.arrowDir];
      if (t.type === 'teleport') { el.dataset.pair = t.pairId || ''; el.textContent = '◉'; }
      el.style.width = `${cs}px`; el.style.height = `${cs}px`;
      el.style.left = `${inset + t.col * cs}px`;
      el.style.top = `${inset + t.row * cs}px`;
      boardEl.appendChild(el);
    });

    // Exit marker on the right edge of EXIT_ROW
    const exit = document.createElement('div');
    exit.className = 'exit';
    exit.style.top = `${inset + EXIT_ROW * cs}px`;
    exit.style.height = `${cs}px`;
    boardEl.appendChild(exit);
  }

  function renderBlocks() {
    [...boardEl.querySelectorAll('.car')].forEach(el => el.remove());
    const cs = cellSize(); const inset = cellInset();
    const palette = ['c1','c2','c3','c4','c5','c6','c7','c8'];
    let p = 0;
    blocks.forEach((b, idx) => {
      if (b.destroyed) return;
      const el = document.createElement('div');
      const classes = ['car'];
      if (b.target) classes.push('target');
      else classes.push(palette[p++ % palette.length]);
      if (b.kind === 'swivel') classes.push('swivel');
      if (b.heavy) classes.push('heavy');
      if (b.breakable) classes.push('breakable');
      if (b.keyId) classes.push('key');
      if (b.lockId) { classes.push('lock'); if (b.unlocked) classes.push('unlocked'); }
      el.className = classes.join(' ');
      el.dataset.idx = idx;
      const cells = cellsOf(b);
      // Bounding box of cells:
      const minR = Math.min(...cells.map(p => p.r));
      const maxR = Math.max(...cells.map(p => p.r));
      const minC = Math.min(...cells.map(p => p.c));
      const maxC = Math.max(...cells.map(p => p.c));
      const wCells = (maxC - minC + 1);
      const hCells = (maxR - minR + 1);
      const pad = 4;
      el.style.width = `${wCells * cs - pad * 2}px`;
      el.style.height = `${hCells * cs - pad * 2}px`;
      el.style.left = `${inset + minC * cs + pad}px`;
      el.style.top = `${inset + minR * cs + pad}px`;
      if (b.target) el.title = 'Target — drive me out!';

      if (b.kind === 'swivel') {
        // Pivot dot at the anchor (b.row, b.col)
        const dot = document.createElement('div');
        dot.className = 'pivot';
        // Position dot at the pivot cell within this element
        const px = (b.col - minC) * cs + cs / 2 - 7 - pad;
        const py = (b.row - minR) * cs + cs / 2 - 7 - pad;
        dot.style.left = `${px}px`;
        dot.style.top = `${py}px`;
        el.appendChild(dot);
        const arc = document.createElement('div');
        arc.className = 'arc-hint';
        el.appendChild(arc);
      }
      if (b.keyId) {
        // Tint key glow by id
        const colors = { A:'#fbbf24', B:'#38bdf8', C:'#a78bfa', D:'#34d399' };
        el.style.setProperty('--key-color', colors[b.keyId] || '#fbbf24');
      }
      if (b.lockId) {
        const colors = { A:'#fbbf24', B:'#38bdf8', C:'#a78bfa', D:'#34d399' };
        el.style.setProperty('--key-color', colors[b.lockId] || '#fbbf24');
      }
      // First-encounter pulse
      const lvl = LEVELS[levelIdx];
      const mech = firstEncounterFor(b, lvl);
      if (mech && !progress.hintShown[mech]) el.classList.add('first-time');

      attachInput(el, idx);
      boardEl.appendChild(el);
    });
  }

  function repositionBlocks() {
    // Resize-only path: re-render is cheap enough.
    renderBlocks();
    // Reposition exit & tiles by rebuilding board layout
    const cs = cellSize(); const inset = cellInset();
    const exit = boardEl.querySelector('.exit');
    if (exit) { exit.style.top = `${inset + EXIT_ROW * cs}px`; exit.style.height = `${cs}px`; }
    [...boardEl.querySelectorAll('.tile')].forEach((el, i) => {
      const t = tiles[i]; if (!t) return;
      el.style.width = `${cs}px`; el.style.height = `${cs}px`;
      el.style.left = `${inset + t.col * cs}px`;
      el.style.top = `${inset + t.row * cs}px`;
    });
  }

  function firstEncounterFor(b, lvl) {
    if (b.kind === 'swivel') return 'swivel';
    if (b.heavy) return 'heavy';
    if (b.breakable) return 'breakable';
    if (b.keyId || b.lockId) return 'keylock';
    return null;
  }
  function levelHasFirstEncounter(lvl) {
    for (const b of (lvl.blocks || lvl.cars || [])) {
      const m = firstEncounterFor(normalizeBlock(b, 0), lvl);
      if (m && !progress.hintShown[m]) return m;
    }
    if ((lvl.tiles || []).some(t => t.type === 'oneway')   && !progress.hintShown.oneway)   return 'oneway';
    if ((lvl.tiles || []).some(t => t.type === 'teleport') && !progress.hintShown.teleport) return 'teleport';
    if (lvl.gravity && !progress.hintShown.gravity) return 'gravity';
    return null;
  }
  const HINT_TEXT = {
    swivel: 'Anchored block — drag the free end to swing it.',
    heavy:  'Heavier blocks need more effort to budge.',
    breakable: 'Brittle. Push too hard and it shatters.',
    keylock: 'Match the key to its lock.',
    oneway: 'Some tiles only allow one direction of travel.',
    teleport: 'Stepping on this paired tile sends you across.',
    gravity: 'Gravity pulls everything down after each move.',
  };
  function showHintBanner(mech) {
    if (!mech || !HINT_TEXT[mech]) return;
    hintBanner.textContent = HINT_TEXT[mech];
    hintBanner.classList.add('show');
    setTimeout(() => hintBanner.classList.remove('show'), 4200);
    progress.hintShown[mech] = true;
    saveProgress();
  }

  function updateHud() {
    const lvl = LEVELS[levelIdx];
    levelNumEl.textContent = lvl.name;
    movesEl.textContent = moves;
    const lk = levelKey();
    const best = progress.best[lk];
    bestEl.textContent = best != null ? best : '—';
    optimalEl.textContent = solveData?.minMoves != null && solveData.minMoves >= 0 ? solveData.minMoves : '—';
    diffBadge.innerHTML = `<span class="difficulty-tag ${lvl.diff}">${lvl.diff.toUpperCase()}</span>`;
    btnUndo.disabled = history.length === 0;
    btnPrev.disabled = levelIdx === 0;
    btnNext.disabled = !progress.solved[lk] || levelIdx >= LEVELS.length - 1;
    btnReplay.disabled = !solveData || solveData.minMoves < 0;
    // Theme switch
    const pack = packForLevel(lvl.name);
    document.body.dataset.theme = pack.id;
  }

  function levelKey() { return dailyMode ? `daily-${todayKey()}` : levelIdx; }
  function todayKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }

  // ============ Input: slider drag, swivel drag-arc ============
  function attachInput(el, idx) {
    el.addEventListener('mousedown', (e) => startDrag(e, idx, el));
    el.addEventListener('touchstart', (e) => startDrag(e, idx, el), { passive: false });
    el.addEventListener('click', () => { selectedBlockIdx = idx; });
  }
  function startDrag(e, idx, el) {
    if (won || replayActive) return;
    e.preventDefault();
    const b = blocks[idx];
    if (b.lockId && !b.unlocked) return;
    const cs = cellSize(); const inset = cellInset();
    const rect = boardEl.getBoundingClientRect();
    const pageX = (e.touches ? e.touches[0].clientX : e.clientX);
    const pageY = (e.touches ? e.touches[0].clientY : e.clientY);
    if (b.kind === 'swivel') {
      const piv = pivotOf(b);
      const pivX = inset + (piv.c + 0.5) * cs + rect.left;
      const pivY = inset + (piv.r + 0.5) * cs + rect.top;
      dragState = {
        kind: 'rotate', idx, el, b, cs, inset,
        pivX, pivY, startAngle: Math.atan2(pageY - pivY, pageX - pivX),
        currentAngle: Math.atan2(pageY - pivY, pageX - pivX),
        rectLeft: rect.left, rectTop: rect.top,
      };
    } else {
      const maxFwd = maxSlide(blocks, idx, +1);
      const maxBwd = maxSlide(blocks, idx, -1);
      dragState = {
        kind: 'slide', idx, el, b, cs, inset,
        startX: pageX, startY: pageY,
        origCol: b.col, origRow: b.row,
        maxFwd, maxBwd, pad: 4, dx: 0, dy: 0,
        rectLeft: rect.left, rectTop: rect.top,
      };
    }
    el.classList.add('dragging');
    selectedBlockIdx = idx;
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchend', endDrag);
  }
  function onDragMove(e) {
    if (!dragState) return;
    e.preventDefault();
    const pageX = (e.touches ? e.touches[0].clientX : e.clientX);
    const pageY = (e.touches ? e.touches[0].clientY : e.clientY);
    if (dragState.kind === 'slide') {
      const { b, cs, maxFwd, maxBwd, inset, pad, origRow, origCol, el } = dragState;
      let dx = pageX - dragState.startX;
      let dy = pageY - dragState.startY;
      const heavy = b.heavy && b.heavy > 1 ? b.heavy : 1;
      // Effective distance: divide by heavy to make heavy blocks slow to move.
      if (b.dir === 'h') {
        const minPx = -maxBwd * cs * heavy;
        const maxPx = (maxFwd + (b.breakable ? 0.5 : 0)) * cs * heavy;
        dx = Math.max(minPx, Math.min(maxPx, dx));
        dy = 0;
      } else {
        const minPx = -maxBwd * cs * heavy;
        const maxPx = (maxFwd + (b.breakable ? 0.5 : 0)) * cs * heavy;
        dy = Math.max(minPx, Math.min(maxPx, dy));
        dx = 0;
      }
      dragState.dx = dx; dragState.dy = dy;
      // Visual: divide drag by heavy so the block appears to lag
      const visualDx = dx / heavy;
      const visualDy = dy / heavy;
      el.style.left = `${inset + origCol * cs + pad + visualDx}px`;
      el.style.top = `${inset + origRow * cs + pad + visualDy}px`;
    } else {
      // Rotate (swivel): just track cursor angle; commit on release.
      dragState.currentAngle = Math.atan2(pageY - dragState.pivY, pageX - dragState.pivX);

    for (let c = b.col + b.len; c < GRID_COLS; c++) {

  function triggerWin() {
    won = true;
    stopTimer();
    const lk = levelKey();

    if (prevBest == null || moves < prevBest) progress.best[lk] = moves;
    if (solveData && solveData.minMoves >= 0 && moves <= solveData.minMoves) progress.perfect[lk] = true;
    saveProgress();
    const elapsed = formatTime(timerElapsed());
    // Compute stars: 3 if optimal, 2 if within +25%, else 1.
    let stars = 1;
    if (solveData && solveData.minMoves >= 0) {

      (solveData && solveData.minMoves >= 0 ? `<br><span style="color:var(--muted)">Optimal: ${solveData.minMoves}</span>` : '');

  // Keyboard: arrow keys move selected slider 1 step
  window.addEventListener('keydown', (e) => {

    if (!b || b.kind === 'swivel') return;
    let delta = 0, axis = '';
    if (e.key === 'ArrowLeft')  { axis = 'h'; delta = -1; }
    if (e.key === 'ArrowRight') { axis = 'h'; delta = +1; }
    if (e.key === 'ArrowUp')    { axis = 'v'; delta = -1; }

  // ============ Timer ============
  function startTimer() {
    timerStart = Date.now();

  }
  function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
  function timerElapsed() { return Math.floor((Date.now() - timerStart) / 1000); }
  function formatTime(s) { const m = Math.floor(s / 60), sec = s % 60; return `${m}:${sec.toString().padStart(2,'0')}`; }

  // ============ Level loading ============
  function loadLevel(idx) {
    if (idx < 0 || idx >= LEVELS.length) return;
    levelIdx = idx;
    dailyMode = false;

    const rawBlocks = lvl.blocks || lvl.cars || [];
    blocks = rawBlocks.map((b, i) => normalizeBlock(b, i));
    tiles = (lvl.tiles || []).map(normalizeTile);
    walls = tiles.filter(t => t.type === 'wall').map(t => ({ r: t.row, c: t.col }));
    onewayMap = {};
    teleportMap = {};
    tiles.forEach(t => {
      if (t.type === 'oneway') onewayMap[`${t.row},${t.col}`] = t.arrowDir;
      if (t.type === 'teleport') {
        // pair with another teleport sharing pairId
        const partner = tiles.find(o => o !== t && o.type === 'teleport' && o.pairId === t.pairId);
        if (partner) teleportMap[`${t.row},${t.col}`] = { r: partner.row, c: partner.col };
      }
    });
    gravity = lvl.gravity || null;
    history = []; moves = 0; won = false; selectedBlockIdx = null;
    winOverlay.classList.add('hidden');
    updateLocks();

  // ============ Level menu ============
  function openLevelMenu() {

      const grid = document.createElement('div'); grid.id = 'level-grid'; grid.style.display = 'grid';
      grid.style.gridTemplateColumns = 'repeat(5, 1fr)'; grid.style.gap = '8px';
      LEVELS.forEach((lvl, i) => {

  // ============ BFS solver ============
  // Encodes the full game state including swivel orientations, destruction, lock states, gravity-settled positions.
  function encodeState(blockList) {
    return blockList.map(b => b.destroyed ? 'X'
      : `${b.dir}${b.extent || 1},${b.row},${b.col}${b.unlocked ? 'U' : ''}`
    ).join('|');
  }

  function bfsSolve(initialBlocks, levelTiles, levelGravity, maxStates = MAX_BFS_STATES) {
    // Build closures that read THIS level's tiles, not the active level's.
    const wallsLocal = (levelTiles || []).filter(t => t.type === 'wall').map(t => ({ r: t.row, c: t.col }));
    const onewayLocal = {}; const teleportLocal = {};
    (levelTiles || []).forEach(t => {
      if (t.type === 'oneway') onewayLocal[`${t.row},${t.col}`] = t.arrowDir;
      if (t.type === 'teleport') {
        const partner = (levelTiles || []).find(o => o !== t && o.type === 'teleport' && o.pairId === t.pairId);
        if (partner) teleportLocal[`${t.row},${t.col}`] = { r: partner.row, c: partner.col };
      }
    });

    function occOf(state) {
      const g = Array.from({ length: GRID_ROWS }, () => Array(GRID_COLS).fill(-1));
      wallsLocal.forEach(w => { if (in_bounds(w.r, w.c)) g[w.r][w.c] = -2; });
      state.forEach((b, idx) => {
        cellsOf(b).forEach(({ r, c }) => { if (in_bounds(r, c)) g[r][c] = idx; });
      });
      return g;
    }
    function lockUpdateLocal(state) {
      const keysByID = {};
      state.forEach((b, i) => { if (b.keyId && !b.destroyed) (keysByID[b.keyId] ||= []).push(i); });
      state.forEach(b => {
        if (b.lockId && !b.unlocked) {
          const keys = keysByID[b.lockId] || [];
          const lockCells = cellsOf(b);
          let touch = false;
          for (const ki of keys) {
            const kc = cellsOf(state[ki]);
            outer: for (const a of lockCells) for (const c of kc) {
              if (Math.abs(a.r - c.r) + Math.abs(a.c - c.c) === 1) { touch = true; break outer; }
            }
            if (touch) break;
          }
          if (touch) b.unlocked = true;
        }
      });
    }
    function gravitySettleLocal(state) {
      if (!levelGravity) return;
      const dr = levelGravity === 'down' ? +1 : -1;
      let changed = true;
      while (changed) {
        changed = false;
        const order = [...state.keys()].sort((a, b) => {
          const ra = Math.max(...cellsOf(state[a]).map(p => p.r), -Infinity);
          const rb = Math.max(...cellsOf(state[b]).map(p => p.r), -Infinity);
          return levelGravity === 'down' ? rb - ra : ra - rb;
        });
        for (const i of order) {
          const b = state[i];
          if (b.destroyed) continue;
          if (b.kind === 'swivel') continue;
          if (b.lockId && !b.unlocked) continue;
          if (b.keyId) continue;

          const occ = occOf(state);
          cells.forEach(({ r, c }) => occ[r][c] = -1);

            const nr = r + dr;

        const { r, c } = cells[i];

        const dc = b.dir === 'h' ? ext : 0;

        for (let j = 0; j < b.len; j++) {
          const nr = newRow + j * dr;
          const nc = newCol + j * dc;

    function maxSlideLocal(state, idx, delta) {
      const b = state[idx];

      if (b.lockId && !b.unlocked) return 0;
      const occ = occOf(state);
      cellsOf(b).forEach(({ r, c }) => occ[r][c] = -1);

      while (true) {
        const next = steps + 1;
        let cr, cc;
        if (delta > 0) {
          cr = b.row + (b.dir === 'v' ? b.len - 1 + next : 0);
          cc = b.col + (b.dir === 'h' ? b.len - 1 + next : 0);
        } else {
          cr = b.row + (b.dir === 'v' ? -next : 0);
          cc = b.col + (b.dir === 'h' ? -next : 0);
        }
        if (!in_bounds(cr, cc)) {
          if (b.target && b.dir === 'h' && delta > 0 && cr === EXIT_ROW) return steps + GRID_COLS;
          break;
        }
        if (occ[cr][cc] !== -1) break;
        const tkey = `${cr},${cc}`;
        if (onewayLocal[tkey]) {
          const moveDir = (b.dir === 'h' ? (delta > 0 ? 'right' : 'left') : (delta > 0 ? 'down' : 'up'));
          if (onewayLocal[tkey] !== moveDir) break;
        }
        steps = next;
      }
      return steps;
    }
    function canRotateLocal(state, idx, newDir, newExtent) {
      const b = state[idx];
      if (b.kind !== 'swivel') return false;
      if (b.dir === newDir) return false;
      const occ = occOf(state);
      cellsOf(b).forEach(({ r, c }) => occ[r][c] = -1);
      const { swept, endBody } = sweptCells(b, newDir, newExtent);
      for (const { r, c } of endBody) {
        if (!in_bounds(r, c)) return false;
        if (occ[r][c] !== -1) return false;
      }
      for (const { r, c } of swept) {

        if (occ[r][c] !== -1) return false;

      const t = state.find(b => b.target && !b.destroyed);

    const start = initialBlocks.map(b => ({ ...b }));
    settleLocal(start, -1);
    const visited = new Map(); visited.set(encodeState(start), 0);

    const queue = [{ state: start, depth: 0 }];
    let head = 0;
    while (head < queue.length) {
      if (visited.size >= maxStates) return { minMoves: -1, path: null };
      const { state, depth } = queue[head++];
      if (isSolvedLocal(state)) return reconstructPath(start, state, parent);
      // Slide moves
      for (let i = 0; i < state.length; i++) {
        const b = state[i];
        if (!b || b.destroyed || b.kind === 'swivel') continue;
        const isHeavy = b.heavy && b.heavy > 1;
        for (const delta of [-1, +1]) {
          const maxS = Math.min(maxSlideLocal(state, i, delta), GRID_COLS);
          // Heavy: only 1-cell increments allowed per move; cost = b.heavy.
          // Non-heavy: any 1..maxS step count is one move; cost = 1.
          const stepRange = isHeavy ? [1] : Array.from({ length: maxS }, (_, k) => k + 1);
          for (const s of stepRange) {
            if (s > maxS) continue;
            const ns = state.map(x => ({ ...x }));
            if (ns[i].dir === 'h') ns[i].col += delta * s;
            else ns[i].row += delta * s;
            settleLocal(ns, i);
            const cost = isHeavy ? b.heavy : 1;
            const key = encodeState(ns);
            const nd = depth + cost;
            if (!visited.has(key) || visited.get(key) > nd) {
              visited.set(key, nd);
              parent.set(key, { from: encodeState(state), move: { kind: 'slide', idx: i, delta, steps: s } });
              queue.push({ state: ns, depth: nd });
            }
          }
          // Breakable: shatter option (full slide + destroy in place)
          if (b.breakable && maxS > 0) {
            const ns = state.map(x => ({ ...x }));
            const slideS = isHeavy ? 1 : maxS;
            if (ns[i].dir === 'h') ns[i].col += delta * slideS;
            else ns[i].row += delta * slideS;
            ns[i].destroyed = true;
            settleLocal(ns, i);
            const cost = isHeavy ? b.heavy : 1;
            const key = encodeState(ns);
            const nd = depth + cost;
            if (!visited.has(key) || visited.get(key) > nd) {
              visited.set(key, nd);
              parent.set(key, { from: encodeState(state), move: { kind: 'shatter', idx: i, delta, steps: slideS } });
              queue.push({ state: ns, depth: nd });
            }
          }
        }
      }
      // Rotate moves (swivels)
      for (let i = 0; i < state.length; i++) {
        const b = state[i];
        if (!b || b.destroyed || b.kind !== 'swivel') continue;
        for (const o of adjacentRotations(b)) {
          if (canRotateLocal(state, i, o.dir, o.extent)) {
            const ns = state.map(x => ({ ...x }));
            ns[i].dir = o.dir; ns[i].extent = o.extent;
            settleLocal(ns, i);
            const key = encodeState(ns);
            const nd = depth + 1;
            if (!visited.has(key) || visited.get(key) > nd) {
              visited.set(key, nd);
              parent.set(key, { from: encodeState(state), move: { kind: 'rotate', idx: i, dir: o.dir, extent: o.extent } });
              queue.push({ state: ns, depth: nd });
            }
          }
        }
      }
    }
    return { minMoves: -1, path: null };

    function reconstructPath(startState, endState, parent) {
      const path = [];
      let key = encodeState(endState);
      while (parent.get(key)) {
        const p = parent.get(key);
        path.push(p.move);
        key = p.from;
      }
      path.reverse();
      const total = path.reduce((acc, m) => {
        if (m.kind === 'rotate') return acc + 1;
        const isHeavy = startState[m.idx].heavy && startState[m.idx].heavy > 1;
        return acc + (isHeavy ? startState[m.idx].heavy : 1);
      }, 0);
      return { minMoves: total, path };
    }
  }

  // Cache solver results per level (in memory; rebuilt at each session)
  const solverCache = new Map();
  function solveLevelCached(idx) {
    if (solverCache.has(idx)) return solverCache.get(idx);
    const lvl = LEVELS[idx];
    const initBlocks = (lvl.blocks || lvl.cars || []).map((b, i) => normalizeBlock(b, i));
    const tilesL = (lvl.tiles || []).map(normalizeTile);
    const result = bfsSolve(initBlocks, tilesL, lvl.gravity || null);
    solverCache.set(idx, result);
    return result;
  }

  // ============ Replay (watch optimal solution) ============
  function playReplay() {
    if (!solveData || !solveData.path) return;
    replayActive = true;
    replayModal.classList.remove('hidden');
    replayTotalEl.textContent = solveData.path.length;
    // Reset the level
    loadLevel(levelIdx);
    replayActive = true; // loadLevel resets, re-enable
    let step = 0;
    function next() {
      if (!replayActive) return;
      if (step >= solveData.path.length) {
        replayModal.classList.add('hidden');
        replayActive = false;
        return;
      }
      const m = solveData.path[step++];
      replayStepEl.textContent = step;
      if (m.kind === 'slide') {
        applySlide(m.idx, m.delta, m.steps);
      } else if (m.kind === 'shatter') {
        applySlide(m.idx, m.delta, m.steps, { shatter: true });
      } else if (m.kind === 'rotate') {
        applyRotate(m.idx, m.dir, m.extent);
      }
      renderBlocks();
      updateHud();
      if (isSolved(blocks)) { triggerWin(); replayActive = false; replayModal.classList.add('hidden'); return; }
      setTimeout(next, 600);
    }
    setTimeout(next, 400);
  }
  function stopReplay() { replayActive = false; replayModal.classList.add('hidden'); }

  // ============ Daily challenge ============
  // Pick a level by deterministic seed from today's date.
  function dailyLevelIdx() {
    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
    // Use mid-game levels (15..70) for daily.
    const pool = LEVELS.length;
    const lo = Math.min(14, pool - 1);
    const hi = Math.min(69, pool - 1);
    if (hi <= lo) return 0;
    return lo + (seed % (hi - lo + 1));
  }
  function loadDaily() {
    const idx = dailyLevelIdx();
    loadLevel(idx);
    dailyMode = true;
    levelNumEl.textContent = `Daily — ${LEVELS[idx].name}`;
